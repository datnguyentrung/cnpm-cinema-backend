spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/cinema}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:31102005}

    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 3
      minimum-idle: 0
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      leak-detection-threshold: 60000
      validation-timeout: 5000
      initialization-fail-timeout: 60000
      auto-commit: false
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      username: ${SPRING_DATA_REDIS_USERNAME:}
      password: ${SPRING_DATA_REDIS_PASSWORD:}

      ssl:
        enabled: false

      repositories:
        enabled: true

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:root}
    password: ${SPRING_RABBITMQ_PASSWORD:31102005}

  jpa:
    hibernate:
      ddl-auto: update # none, validate, update, create, create-drop, update
    database: postgresql
    show-sql: true
    open-in-view: true
    repositories:
      enabled: true
    defer-datasource-initialization: false
    properties:
      hibernate:
        generate_statistics: true
        jdbc:
          time_zone: Asia/Ho_Chi_Minh
          batch_size: 50
          order_updates: true
          order_inserts: true
          batch_versioned_data: true
        connection:
          provider_disables_autocommit: true
        query:
          plan_cache_max_size: 2048
          plan_parameter_metadata_max_size: 128

  #        temp:
  #          use_jdbc_metadata_defaults: false
  #        boot:
  #          allow_jdbc_metadata_access: false

  sql:
    init:
      mode: never

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jackson:
    time-zone: Asia/Ho_Chi_Minh

  flyway:
    enabled: false # Set to true to enable Flyway migrations
    baseline-on-migrate: true
    baseline-version: 1

logging:
  level:
    org.springframework.data.repository.config.RepositoryConfigurationExtensionSupport: ERROR
    org.springframework.security: WARN
    com.zaxxer.hikari: WARN
    org.hibernate: WARN
    org.postgresql: WARN
    root: INFO
    org.springframework.web: DEBUG

    #    root: INFO
    #
    #    # 1. T?T log SQL t?ng d?ng (Th? ph?m g?y hi?u l?m)
    #    org.hibernate.SQL: OFF
    #    org.hibernate.type.descriptor.sql.BasicBinder: OFF
    #
    #    # 2. C? g?ng b?t th?ng k? (N?u Hibernate 7 h? tr? class n?y)
    #    org.hibernate.stat: DEBUG
    #    org.hibernate.engine.internal.StatisticalLoggingSessionEventListener: INFO

    # 3. C?c log h? th?ng kh?c
#    org.springframework.web: INFO # Gi?m xu?ng INFO cho ?? r?c
#    org.postgresql: WARN

jwt:
  base64-secret: ${JWT_BASE64_SECRET}
  access-token-validity-in-seconds: ${JWT_ACCESS_TOKEN_VALIDITY_IN_SECONDS}
  refresh-token-validity-in-seconds: ${JWT_REFRESH_TOKEN_VALIDITY_IN_SECONDS}

password:
  time_password_change_days: ${TIME_PASSWORD_CHANGE_DAYS}

cache:
  ttl:
    one-day-seconds: 86400
    one-week-seconds: 604800
    one-month-seconds: 2592000

bytescale:
  account-id: ${BYTESCALE_ACCOUNT_ID}
  api-key: ${BYTESCALE_API_KEY}

server:
  port: ${PORT:8080}
  address: 0.0.0.0

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
